<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دليل Red Hat — بالدارجة</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Noto+Kufi+Arabic:wght@400;600;700;900&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0d1117;
  --bg1:     #161b22;
  --bg2:     #1c2128;
  --bg3:     #222932;
  --bg4:     #2d333b;
  --border:  #30363d;
  --border2: #444c56;
  --text:    #cdd9e5;
  --text2:   #768390;
  --text3:   #444c56;
  --green:   #3fb950;
  --green2:  #238636;
  --green3:  #0a3622;
  --blue:    #58a6ff;
  --blue2:   #1f3a5f;
  --amber:   #e3b341;
  --amber2:  #3a2d00;
  --red:     #f85149;
  --red2:    #3a0a0a;
  --purple:  #bc8cff;
  --purple2: #2a1840;
  --cyan:    #39d4c9;
  --cyan2:   #0a2e2d;
  --orange:  #f0883e;
  --orange2: #3a1500;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Noto Kufi Arabic', sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  direction: rtl;
  font-size: 14px;
  line-height: 1.5;
}

/* ── HEADER ────────────────────────────────── */
.header {
  background: var(--bg1);
  border-bottom: 1px solid var(--border);
  padding: 0 1.5rem;
  height: 58px;
  display: flex;
  align-items: center;
  gap: 1rem;
  position: sticky;
  top: 0;
  z-index: 200;
  backdrop-filter: blur(8px);
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.brand-badge {
  background: var(--red);
  color: #fff;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 700;
  padding: 4px 9px;
  border-radius: 6px;
  letter-spacing: .04em;
}
.brand-title { font-size: 16px; font-weight: 700; color: var(--text); line-height: 1.2; }
.brand-sub { font-size: 11px; color: var(--text2); }

.search-box {
  flex: 1;
  max-width: 380px;
  margin-right: auto;
  position: relative;
}
.search-box input {
  width: 100%;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 7px 36px 7px 12px;
  color: var(--text);
  font-family: var(--sans);
  font-size: 13px;
  outline: none;
  transition: border-color .2s, box-shadow .2s;
  direction: rtl;
}
.search-box input:focus {
  border-color: var(--green);
  box-shadow: 0 0 0 3px rgba(63,185,80,.12);
}
.search-box input::placeholder { color: var(--text3); }
.search-icon {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text3);
  font-size: 15px;
  pointer-events: none;
}

.header-stats {
  display: flex;
  gap: 18px;
  flex-shrink: 0;
}
.hstat { text-align: center; }
.hstat-n {
  font-family: var(--mono);
  font-size: 18px;
  font-weight: 700;
  color: var(--green);
  line-height: 1;
  display: block;
}
.hstat-l { font-size: 10px; color: var(--text2); margin-top: 1px; display: block; }

/* ── TABS ────────────────────────────────── */
.tabs-bar {
  background: var(--bg1);
  border-bottom: 1px solid var(--border);
  padding: 0 1.5rem;
  overflow-x: auto;
  white-space: nowrap;
  display: flex;
  gap: 4px;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
.tabs-bar::-webkit-scrollbar { display: none; }

.tab-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 10px 14px;
  border: none;
  background: transparent;
  color: var(--text2);
  font-family: var(--sans);
  font-size: 12.5px;
  font-weight: 600;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: color .15s, border-color .15s;
  white-space: nowrap;
  position: relative;
  top: 1px;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--green); border-bottom-color: var(--green); }
.tab-count {
  background: var(--bg3);
  border-radius: 10px;
  padding: 1px 6px;
  font-size: 10px;
  font-family: var(--mono);
}
.tab-btn.active .tab-count { background: var(--green3); color: var(--green); }

/* ── LAYOUT ────────────────────────────────── */
.page { display: flex; min-height: calc(100vh - 97px); }

.sidebar {
  width: 220px;
  flex-shrink: 0;
  background: var(--bg1);
  border-left: 1px solid var(--border);
  padding: 1rem 0;
  position: sticky;
  top: 97px;
  height: calc(100vh - 97px);
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.sidebar-section { margin-bottom: 1.5rem; }
.sidebar-label {
  font-size: 10px;
  font-weight: 700;
  color: var(--text3);
  letter-spacing: .08em;
  padding: 0 1rem;
  margin-bottom: .4rem;
  text-transform: uppercase;
}
.sidebar-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 1rem;
  font-size: 12.5px;
  color: var(--text2);
  cursor: pointer;
  transition: background .12s, color .12s;
  border-right: 2px solid transparent;
}
.sidebar-item:hover { background: var(--bg2); color: var(--text); }
.sidebar-item.active { color: var(--green); border-right-color: var(--green); background: var(--green3); }
.sidebar-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

.content-area { flex: 1; padding: 1.5rem; overflow: hidden; }

/* ── COMBO CARDS ────────────────────────────────── */
.combos-section { margin-bottom: 2rem; }
.combos-title {
  font-size: 11px;
  font-weight: 700;
  color: var(--amber);
  letter-spacing: .07em;
  margin-bottom: .75rem;
  display: flex;
  align-items: center;
  gap: 6px;
}
.combos-title::before { content: ''; flex: 1; height: 1px; background: var(--border); order: 1; }
.combos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 8px; }
.combo-card {
  background: var(--amber2);
  border: 1px solid rgba(227,179,65,.25);
  border-radius: 10px;
  padding: 12px 14px;
}
.combo-card-title { font-size: 12px; font-weight: 700; color: var(--amber); margin-bottom: 8px; }
.combo-code { font-family: var(--mono); font-size: 11.5px; direction: ltr; text-align: left; line-height: 1.8; overflow-x: auto; }
.combo-cmd { color: #85e89d; }
.combo-cmt { color: var(--text3); }
.combo-prompt { color: var(--text3); margin-left: 4px; }

/* ── SECTION ────────────────────────────────── */
.section { margin-bottom: 2rem; }
.section-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: .75rem;
  padding-bottom: .5rem;
  border-bottom: 1px solid var(--border);
}
.section-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.section-title { font-size: 12px; font-weight: 700; color: var(--text2); letter-spacing: .04em; }
.section-count { font-size: 11px; color: var(--text3); font-family: var(--mono); margin-right: auto; }

.cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 8px; }

/* ── CARD ────────────────────────────────── */
.cmd-card {
  background: var(--bg1);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  transition: border-color .15s, box-shadow .15s;
  animation: fadeIn .2s ease;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
.cmd-card:hover { border-color: var(--border2); }
.cmd-card.open { border-color: var(--green2); box-shadow: 0 0 0 1px var(--green2); }

.card-head {
  padding: 12px 14px;
  display: flex;
  align-items: flex-start;
  gap: 10px;
}
.card-icon {
  width: 34px;
  height: 34px;
  border-radius: 7px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}
.card-texts { flex: 1; min-width: 0; }
.card-name {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 700;
  color: var(--green);
  direction: ltr;
  text-align: left;
  display: block;
  margin-bottom: 3px;
}
.card-ar { font-size: 13px; font-weight: 700; color: var(--text); display: block; margin-bottom: 2px; }
.card-short { font-size: 12px; color: var(--text2); display: block; line-height: 1.4; }
.card-chevron {
  color: var(--text3);
  font-size: 16px;
  flex-shrink: 0;
  margin-top: 8px;
  transition: transform .2s;
  user-select: none;
}
.cmd-card.open .card-chevron { transform: rotate(180deg); color: var(--green); }

.card-body {
  display: none;
  border-top: 1px solid var(--border);
  padding: 14px;
  animation: slideDown .15s ease;
}
@keyframes slideDown { from { opacity: 0; } to { opacity: 1; } }
.cmd-card.open .card-body { display: block; }

.card-desc {
  font-size: 12.5px;
  color: var(--text2);
  line-height: 1.7;
  margin-bottom: 12px;
  padding: 8px 12px;
  background: var(--bg2);
  border-radius: 6px;
  border-right: 3px solid var(--blue);
}

.ex-label {
  font-size: 10px;
  font-weight: 700;
  color: var(--text3);
  letter-spacing: .07em;
  margin-bottom: 6px;
  text-transform: uppercase;
}

.ex-block {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  font-family: var(--mono);
  font-size: 11.5px;
  direction: ltr;
  text-align: left;
  overflow-x: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.ex-row {
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 6px;
  align-items: baseline;
  padding: 2px 0;
}
.ex-row:hover { background: rgba(255,255,255,.02); border-radius: 4px; }
.ex-p { color: var(--text3); user-select: none; }
.ex-c { color: #85e89d; white-space: pre; }
.ex-comment { color: var(--text3); font-size: 10.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.flags-row { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 5px; }
.flag-chip {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 2px 8px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--purple);
  direction: ltr;
  display: inline-block;
}

.tip-box {
  margin-top: 10px;
  background: var(--amber2);
  border: 1px solid rgba(227,179,65,.3);
  border-radius: 6px;
  padding: 8px 12px;
  font-size: 12px;
  color: var(--amber);
  line-height: 1.6;
  direction: rtl;
}
.tip-label { font-weight: 700; margin-left: 5px; }

/* ── COPY BTN ─────────────────────────── */
.copy-btn {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 5px;
  color: var(--text2);
  font-size: 11px;
  padding: 2px 8px;
  cursor: pointer;
  font-family: var(--sans);
  transition: all .15s;
  flex-shrink: 0;
  white-space: nowrap;
}
.copy-btn:hover { border-color: var(--green); color: var(--green); }
.copy-btn.copied { background: var(--green3); border-color: var(--green); color: var(--green); }

/* ── EMPTY ─────────────────────────── */
.empty-state {
  text-align: center;
  padding: 4rem 2rem;
  color: var(--text3);
}
.empty-state h3 { font-size: 18px; color: var(--text2); margin-bottom: 8px; }

/* ── CAT COLORS ─────────────────────────── */
.ic-sys   { background: #041c2c; color: var(--blue); }
.ic-files { background: #0a2e10; color: var(--green); }
.ic-net   { background: var(--purple2); color: var(--purple); }
.ic-log   { background: var(--amber2); color: var(--amber); }
.ic-grep  { background: var(--red2); color: var(--red); }
.ic-redir { background: #1a0e2e; color: #d8b4fe; }
.ic-pkg   { background: #0c1d3a; color: var(--blue); }
.ic-proc  { background: #1a2800; color: #a3e635; }
.ic-user  { background: var(--cyan2); color: var(--cyan); }
.ic-perm  { background: #2a1c00; color: #fbbf24; }
.ic-selinux { background: var(--orange2); color: var(--orange); }

.dot-sys    { background: var(--blue); }
.dot-files  { background: var(--green); }
.dot-net    { background: var(--purple); }
.dot-log    { background: var(--amber); }
.dot-grep   { background: var(--red); }
.dot-redir  { background: #d8b4fe; }
.dot-pkg    { background: #60a5fa; }
.dot-proc   { background: #a3e635; }
.dot-user   { background: var(--cyan); }
.dot-perm   { background: #fbbf24; }
.dot-selinux { background: var(--orange); }

@media (max-width: 900px) {
  .sidebar { display: none; }
  .header-stats { display: none; }
  .search-box { max-width: 100%; }
}
@media (max-width: 600px) {
  .content-area { padding: 1rem .75rem; }
  .header { padding: 0 .75rem; }
  .tabs-bar { padding: 0 .75rem; }
  .cards-grid { grid-template-columns: 1fr; }
  .combos-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="brand">
    <span class="brand-badge">RHEL</span>
    <div>
      <div class="brand-title">دليل Red Hat</div>
      <div class="brand-sub">أوامر يومية بالدارجة</div>
    </div>
  </div>
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="ابحث... grep، tail، systemctl، firewall" oninput="doSearch()">
  </div>
  <div class="header-stats">
    <div class="hstat"><span class="hstat-n" id="totalCount">0</span><span class="hstat-l">أمر</span></div>
    <div class="hstat"><span class="hstat-n">11</span><span class="hstat-l">فئة</span></div>
  </div>
</header>

<!-- TABS -->
<nav class="tabs-bar" id="tabsBar"></nav>

<!-- PAGE -->
<div class="page">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="content-area" id="contentArea"></main>
</div>

<script>
/* ────────────────────────────────────────────────────
   DATA
──────────────────────────────────────────────────── */
const CATEGORIES = [
  { id:'sys',    label:'النظام',           icon:'⚙️',  dot:'dot-sys' },
  { id:'files',  label:'الملفات',          icon:'📁',  dot:'dot-files' },
  { id:'net',    label:'الشبكة',           icon:'🌐',  dot:'dot-net' },
  { id:'log',    label:'اللوغات',          icon:'📋',  dot:'dot-log' },
  { id:'grep',   label:'Grep والتصفية',    icon:'🔍',  dot:'dot-grep' },
  { id:'redir',  label:'التحويل والـPipe', icon:'➡️',  dot:'dot-redir' },
  { id:'pkg',    label:'الحزم dnf/rpm',    icon:'📦',  dot:'dot-pkg' },
  { id:'proc',   label:'البروسيسات',       icon:'⚡',  dot:'dot-proc' },
  { id:'user',   label:'المستخدمين',       icon:'👤',  dot:'dot-user' },
  { id:'perm',   label:'الصلاحيات',        icon:'🔐',  dot:'dot-perm' },
  { id:'selinux',label:'SELinux',          icon:'🛡️',  dot:'dot-selinux' },
];

const COMBOS = [
  { cats:['log','grep'], title:'🔥 مراقبة اللوغات مباشرة + حفظ الأخطاء', lines:[
    ['tail -f /var/log/messages | grep -iE \'error|warn|crit\' | tee /tmp/errors_$(date +%F).txt', 'راقب + صفّي + احفظ كلهم مع بعض']
  ]},
  { cats:['grep'], title:'🌐 أكثر عناوين IP اللي طلبت 404', lines:[
    ['cat /var/log/nginx/access.log | awk \'$9==404{print $1}\' | sort | uniq -c | sort -rn | head -10', 'أكثر 10 IP']
  ]},
  { cats:['net'], title:'🔌 شوف من يستمع على port معين', lines:[
    ['ss -tlnp | grep \':80\'', 'من على port 80'],
    ['lsof -i :443', 'من على HTTPS'],
  ]},
  { cats:['selinux'], title:'🛡️ تشخيص سريع لمشكلة SELinux', lines:[

    ['setenforce 1', 'ارجع Enforcing دايماً بعد الاختبار!'],
  ]},
  { cats:['proc'], title:'⚡ من يأكل الموارد؟', lines:[
    ['ps aux --sort=-%cpu | head -5', 'أكثر 5 استهلاكاً للمعالج'],
    ['ps aux --sort=-%mem | head -5', 'أكثر 5 استهلاكاً للرام'],
  ]},
  { cats:['files'], title:'💾 ابحث عمن يأكل المساحة', lines:[
    ['du -sh /var/log/* | sort -rh | head -10', 'أكبر 10 ملفات/مجلدات في /var/log'],
    ['df -h | grep -v tmpfs', 'حالة الأقسام بدون tmpfs'],
  ]},
];

const DATA = [

{c:'sys',icon:'⚙️',n:'systemctl',ar:'تحكم كامل في الخدمات',s:'أهم أمر في RHEL — ابدأ توقف أعد شغّل الخدمات',
d:'systemctl = Swiss Army Knife ديال إدارة الخدمات. لازم تعرفها غيباً.',

  ['systemctl disable nginx','لا تشغّلها تلقائياً'],

  ['systemctl is-enabled nginx','هل مفعّلة مع الإقلاع؟'],

  ['systemctl list-units --failed','الخدمات اللي خبات (مهمة!)'],
  ['systemctl daemon-reload','أعد تحميل إعدادات systemd'],
  ['systemctl mask nginx','امنع الخدمة من التشغيل نهائياً'],
  ['systemctl unmask nginx','أزل المنع'],
],tip:'systemctl status = أول شيء تشوف عند أي مشكلة في خدمة',
flags:['start','stop','restart','reload','enable','disable','status','--failed','daemon-reload']},

{c:'sys',icon:'📖',n:'journalctl',ar:'لوغات systemd — أقوى من tail',s:'اقرأ logs أي خدمة مع فيلتر بالتاريخ والأولوية',
d:'journalctl = مستودع كل الـlogs في RHEL الحديث. أقوى وأنظف من cat للملفات.',
ex:[

  ['journalctl -u nginx -f','متابعة مباشرة (مثل tail -f)'],
  ['journalctl -u nginx -n 100','آخر 100 سطر'],
  ['journalctl -u nginx --since "1 hour ago"','من ساعة'],
  ['journalctl -u nginx --since "2024-01-01" --until "2024-01-02"','بين تاريخين'],
  ['journalctl -p err','أخطاء فقط — من كل الخدمات'],
  ['journalctl -p err -b','أخطاء من آخر restart'],

  ['journalctl --no-pager -u nginx | grep ERROR','مع grep'],

{c:'sys',icon:'💻',n:'hostnamectl / uname',ar:'هوية الجهاز والنظام',s:'أول شيء تشوف في أي مشن — نسخة RHEL والكيرنيل',

ex:[
  ['hostnamectl','كل معلومات الجهاز دفعة واحدة'],

/* ────────────────────────────────────────────────────
   STATE
──────────────────────────────────────────────────── */
let curCat = 'all';

document.getElementById('totalCount').textContent = DATA.length;

/* ────────────────────────────────────────────────────
   RENDER TABS
──────────────────────────────────────────────────── */
function buildTabs() {
  const bar = document.getElementById('tabsBar');
  const counts = {};
  DATA.forEach(d => { counts[d.c] = (counts[d.c] || 0) + 1; });

  let html = `<button class="tab-btn active" data-cat="all">
    الكل <span class="tab-count">${DATA.length}</span>
  </button>`;
  CATEGORIES.forEach(cat => {
    const n = counts[cat.id] || 0;
    html += `<button class="tab-btn" data-cat="${cat.id}">
      ${cat.icon} ${cat.label} <span class="tab-count">${n}</span>
    </button>`;
  });
  bar.innerHTML = html;
  bar.addEventListener('click', e => {
    const btn = e.target.closest('.tab-btn');
    if (!btn) return;
    curCat = btn.dataset.cat;
    bar.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    // sync sidebar
    document.querySelectorAll('.sidebar-item').forEach(si => {
      si.classList.toggle('active', si.dataset.cat === curCat);
    });
    render();
  });
}

/* ────────────────────────────────────────────────────
   RENDER SIDEBAR
──────────────────────────────────────────────────── */
function buildSidebar() {
  const counts = {};
  DATA.forEach(d => { counts[d.c] = (counts[d.c] || 0) + 1; });
  const sb = document.getElementById('sidebar');
  let html = `<div class="sidebar-section">
    <div class="sidebar-label">التصنيفات</div>
    <div class="sidebar-item active" data-cat="all">
      <span class="sidebar-dot" style="background:#6e7681"></span>
      الكل (${DATA.length})
    </div>`;
  CATEGORIES.forEach(cat => {
    html += `<div class="sidebar-item" data-cat="${cat.id}">
      <span class="sidebar-dot ${cat.dot}"></span>
      ${cat.label} (${counts[cat.id] || 0})
    </div>`;
  });
  html += '</div>';
  sb.innerHTML = html;
  sb.addEventListener('click', e => {
    const item = e.target.closest('.sidebar-item');
    if (!item) return;
    curCat = item.dataset.cat;
    sb.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
    item.classList.add('active');
    // sync tabs
    document.querySelectorAll('.tab-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.cat === curCat);
    });
    render();
  });
}

/* ────────────────────────────────────────────────────
   RENDER CONTENT
──────────────────────────────────────────────────── */
function render() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  let items = DATA.filter(d => {
    if (curCat !== 'all' && d.c !== curCat) return false;
    if (q) {
      return d.n.toLowerCase().includes(q) ||
        d.ar.toLowerCase().includes(q) ||
        d.s.toLowerCase().includes(q) ||
        d.d.toLowerCase().includes(q) ||
        d.ex.some(e => e[0].toLowerCase().includes(q) || e[1].toLowerCase().includes(q));
    }
    return true;
  });

  if (!items.length) {
    document.getElementById('contentArea').innerHTML = `
      <div class="empty-state">
        <h3>ما لقينا والو 😅</h3>
        <p>جرب بكلمة أخرى — مثلاً: grep، tail، port، service</p>
      </div>`;
    return;
  }

  const grps = {};
  items.forEach(d => { if (!grps[d.c]) grps[d.c] = []; grps[d.c].push(d); });

  let html = '';

  // Combos
  const showCombos = COMBOS.filter(cb =>
    !q && (curCat === 'all' || cb.cats.includes(curCat))
  );
  if (showCombos.length) {
    html += `<div class="combos-section">
      <div class="combos-title">💡 أوامر مركبة جاهزة</div>
      <div class="combos-grid">`;
    showCombos.forEach(cb => {
      html += `<div class="combo-card">
        <div class="combo-card-title">${cb.title}</div>
        <div class="combo-code">`;
      cb.lines.forEach(l => {
        html += `<div><span class="combo-prompt">$</span><span class="combo-cmd">${esc(l[0])}</span>  <span class="combo-cmt"># ${esc(l[1])}</span></div>`;
      });
      html += `</div></div>`;
    });
    html += `</div></div>`;
  }

  // cat order
  const catOrder = CATEGORIES.map(c => c.id);
  const orderedCats = Object.keys(grps).sort((a, b) => catOrder.indexOf(a) - catOrder.indexOf(b));

  orderedCats.forEach(cat => {
    const catMeta = CATEGORIES.find(c => c.id === cat) || {};
    html += `<div class="section">
      <div class="section-header">
        <div class="section-dot ${catMeta.dot || ''}"></div>
        <div class="section-title">${catMeta.icon || ''} ${catMeta.label || cat}</div>
        <div class="section-count">${grps[cat].length} أمر</div>
      </div>
      <div class="cards-grid">`;
    grps[cat].forEach((d, i) => {
      const id = `card_${cat}_${i}_${Math.random().toString(36).slice(2,6)}`;
      const rows = d.ex.map(e =>
        `<div class="ex-row"><span class="ex-p">$</span><span class="ex-c">${esc(e[0])}</span><span class="ex-comment"># ${esc(e[1])}</span></div>`
      ).join('');
      const chips = d.flags && d.flags.length
        ? `<div class="flags-row">${d.flags.map(f => `<span class="flag-chip">${esc(f)}</span>`).join('')}</div>` : '';
      html += `<div class="cmd-card" id="${id}" onclick="toggleCard('${id}')">
        <div class="card-head">
          <div class="card-icon ic-${cat}">${d.icon}</div>
          <div class="card-texts">
            <span class="card-name">${esc(d.n)}</span>
            <span class="card-ar">${d.ar}</span>
            <span class="card-short">${d.s}</span>
          </div>
          <span class="card-chevron">▾</span>
        </div>
        <div class="card-body">
          <div class="card-desc">${d.d}</div>
          <div class="ex-label">الأمثلة:</div>
          <div class="ex-block">${rows}</div>
          ${chips}
          ${d.tip ? `<div class="tip-box"><span class="tip-label">💡 نصيحة يومية:</span>${d.tip}</div>` : ''}
        </div>
      </div>`;
    });
    html += `</div></div>`;
  });

  document.getElementById('contentArea').innerHTML = html;
}

function toggleCard(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('open');
}

function doSearch() { render(); }

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

/* INIT */
buildTabs();
buildSidebar();
render();
</script>
</body>
</html>
