  <link rel="manifest" href="/manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">

    :root{--red:#cc0000;--red-dark:#990000;--red-light:#ff2222;--bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#242424;--text:#f0f0f0;--text2:#aaaaaa;--green:#00ff88;--yellow:#ffd700;--blue:#4a9eff;--border:#2a2a2a;}
    *{margin:0;padding:0;box-sizing:border-box;}

    .header-text{flex:1;}
    .header-text h1{font-size:1.2rem;font-weight:900;color:#fff;line-height:1.1;}
    .header-text span{font-size:0.72rem;color:var(--red-light);font-family:'JetBrains Mono',monospace;letter-spacing:1px;}
    .lang-btn{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#fff;padding:6px 12px;border-radius:20px;font-size:0.8rem;cursor:pointer;display:flex;align-items:center;gap:5px;font-family:'Tajawal',sans-serif;font-weight:700;transition:all 0.2s;flex-shrink:0;}
    .lang-btn:hover{background:var(--red);border-color:var(--red);}
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:999;align-items:flex-end;justify-content:center;}
    .modal-overlay.open{display:flex;}
    .modal-box{background:var(--bg2);border:1px solid var(--border);border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:480px;animation:slideUp 0.3s ease;}
    @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    .modal-title{font-size:1rem;font-weight:900;color:var(--text);margin-bottom:16px;text-align:center;}
    .lang-option{display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:12px;cursor:pointer;margin-bottom:8px;border:2px solid var(--border);background:var(--bg3);transition:all 0.2s;}
    .lang-option:hover{border-color:var(--red);}
    .lang-option.selected{border-color:var(--red);background:rgba(204,0,0,0.1);}
    .lang-flag{font-size:1.8rem;}
    .lang-info h3{font-size:1rem;font-weight:700;color:var(--text);}
    .lang-info p{font-size:0.78rem;color:var(--text2);}
    .lang-check{margin-left:auto;color:var(--red);font-size:1.2rem;}
    .modal-cancel{width:100%;padding:12px;border-radius:12px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);font-size:0.88rem;cursor:pointer;margin-top:4px;font-family:'Tajawal',sans-serif;}
    .search-wrap{padding:12px 16px;background:var(--bg2);border-bottom:1px solid var(--border);position:relative;}
    .search-icon{position:absolute;left:28px;top:50%;transform:translateY(-50%);color:var(--text2);pointer-events:none;}
    .search-box{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:11px 16px 11px 40px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:0.88rem;outline:none;transition:border-color 0.2s;}
    .search-box:focus{border-color:var(--red);box-shadow:0 0 0 3px rgba(204,0,0,0.15);}
    .categories{display:flex;gap:8px;padding:12px 16px;overflow-x:auto;scrollbar-width:none;background:var(--bg2);border-bottom:1px solid var(--border);}
    .categories::-webkit-scrollbar{display:none;}
    .cat-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:7px 14px;border-radius:20px;font-size:0.78rem;font-family:'Tajawal',sans-serif;font-weight:700;white-space:nowrap;cursor:pointer;transition:all 0.2s;flex-shrink:0;}
    .cat-btn.active,.cat-btn:hover{background:var(--red);border-color:var(--red);color:#fff;}
    .stats-bar{padding:9px 16px;font-size:0.73rem;color:var(--text2);font-family:'JetBrains Mono',monospace;border-bottom:1px solid var(--border);}
    .stats-bar span{color:var(--green);}
    .command-list{padding:12px 16px;display:flex;flex-direction:column;gap:8px;}
    .section-title{font-size:0.68rem;font-family:'JetBrains Mono',monospace;color:var(--red);letter-spacing:2px;text-transform:uppercase;padding:14px 0 6px;border-bottom:1px solid var(--border);margin-bottom:4px;}
    .cmd-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:all 0.2s;}
    .cmd-card:hover{border-color:rgba(204,0,0,0.4);}
    .cmd-card.open{border-color:var(--red);box-shadow:0 0 16px rgba(204,0,0,0.15);}
    .cmd-header{display:flex;align-items:center;gap:12px;padding:13px 14px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;}
    .cmd-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;}
    .cmd-info{flex:1;min-width:0;}
    .cmd-name{font-family:'JetBrains Mono',monospace;font-size:0.95rem;font-weight:700;color:var(--green);}
    .cmd-short{font-size:0.76rem;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
    .cmd-arrow{color:var(--text2);font-size:0.85rem;transition:transform 0.3s;flex-shrink:0;}
    .cmd-card.open .cmd-arrow{transform:rotate(180deg);}
    .cmd-body{display:none;padding:0 14px 14px;border-top:1px solid var(--border);}
    .cmd-card.open .cmd-body{display:block;}
    .cmd-desc{font-size:0.88rem;color:var(--text);line-height:1.65;padding:11px 0 9px;}
    .cmd-label{font-size:0.68rem;font-family:'JetBrains Mono',monospace;color:var(--red-light);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;margin-top:9px;}
    .cmd-syntax{background:#0a0a0a;border:1px solid var(--border);border-left:3px solid var(--red);border-radius:8px;padding:11px 13px;font-family:'JetBrains Mono',monospace;font-size:0.8rem;color:var(--yellow);word-break:break-all;line-height:1.6;}
    .cmd-example{background:#050505;border:1px solid var(--border);border-left:3px solid var(--green);border-radius:8px;padding:11px 13px;font-family:'JetBrains Mono',monospace;font-size:0.8rem;color:var(--green);word-break:break-all;line-height:1.8;}
    .cmd-example .comment{color:#555;}
    .copy-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:6px 13px;border-radius:6px;font-size:0.73rem;cursor:pointer;margin-top:8px;font-family:'JetBrains Mono',monospace;transition:all 0.2s;display:inline-flex;align-items:center;gap:5px;}
    .copy-btn:hover,.copy-btn.copied{background:var(--red);border-color:var(--red);color:#fff;}
    .badge{font-size:0.63rem;padding:2px 7px;border-radius:10px;font-weight:700;font-family:'JetBrains Mono',monospace;flex-shrink:0;}
    .badge-danger{background:rgba(255,50,50,0.15);color:#ff5555;border:1px solid #ff555533;}
    .badge-info{background:rgba(74,158,255,0.15);color:#4a9eff;border:1px solid #4a9eff33;}
    .empty{text-align:center;padding:60px 20px;color:var(--text2);font-family:'JetBrains Mono',monospace;}
    .empty div{font-size:2rem;margin-bottom:10px;}
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);display:flex;padding:8px 0 12px;z-index:100;}
    .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px;cursor:pointer;color:var(--text2);font-size:0.63rem;font-family:'Tajawal',sans-serif;transition:color 0.2s;-webkit-tap-highlight-color:transparent;}
    .nav-item.active{color:var(--red);}
    .nav-item span:first-child{font-size:1.25rem;}
    .bottom-spacer{height:80px;}
    .page{display:none;}
    .page.active{display:block;}
    .tip-card{background:linear-gradient(135deg,#1a0a0a,#0a1a0a);border:1px solid #333;border-radius:12px;padding:15px;margin:8px 16px;}
    .tip-card .tip-icon{font-size:1.4rem;margin-bottom:5px;}
    .tip-card h4{color:var(--text);font-size:0.88rem;margin-bottom:4px;}
    .tip-card p{color:var(--text2);font-size:0.78rem;line-height:1.6;}
    .about-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:18px;margin:12px 16px;}
    .about-card h3{color:var(--red-light);font-size:0.95rem;margin-bottom:7px;}
    .about-card p{color:var(--text2);font-size:0.82rem;line-height:1.7;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .cmd-card{animation:fadeIn 0.3s ease both;}
  </style>
</head>
<body>

<div class="header">
  <svg class="logo" viewBox="0 0 100 100"><circle cx="50" cy="50" r="48" fill="#cc0000"/><path d="M50 15C30 15 15 30 15 50C15 70 30 85 50 85C70 85 85 70 85 50C85 30 70 15 50 15Z" fill="#aa0000"/><path d="M35 35L50 20L65 35L65 55Q65 68 50 75Q35 68 35 55Z" fill="white" opacity="0.95"/><path d="M42 48L50 32L58 48L55 48L55 62L45 62L45 48Z" fill="#cc0000"/><circle cx="50" cy="70" r="4" fill="white" opacity="0.5"/></svg>
  <div class="header-text">
    <h1 id="appTitle">RedHat Darija</h1>
    <span id="appSubtitle">دليل الأوامر للمبتدئين</span>
  </div>
  <button class="lang-btn" onclick="openLangModal()">
    <span id="currentLangFlag">🇲🇦</span>
    <span id="currentLangCode">AR</span>
  </button>
</div>

<!-- LANG MODAL -->
<div class="modal-overlay" id="langModal" onclick="closeLangModalOutside(event)">
  <div class="modal-box">
    <div class="modal-title" id="modalTitle">اختار اللغة</div>
    <div class="lang-option selected" id="opt-ar" onclick="setLang('ar')">
      <span class="lang-flag">🇲🇦</span>
      <div class="lang-info"><h3>الدارجة المغربية</h3><p>Arabic / Darija</p></div>
      <span class="lang-check" id="check-ar">✓</span>
    </div>
    <div class="lang-option" id="opt-fr" onclick="setLang('fr')">
      <span class="lang-flag">🇫🇷</span>
      <div class="lang-info"><h3>Français</h3><p>French / Français</p></div>
      <span class="lang-check" id="check-fr" style="display:none">✓</span>
    </div>
    <div class="lang-option" id="opt-en" onclick="setLang('en')">
      <span class="lang-flag">🇬🇧</span>
      <div class="lang-info"><h3>English</h3><p>English / Anglais</p></div>
      <span class="lang-check" id="check-en" style="display:none">✓</span>
    </div>
    <button class="modal-cancel" onclick="closeLangModal()">إلغاء / Annuler / Cancel</button>
  </div>
</div>

<!-- HOME PAGE -->
<div class="page active" id="page-home">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-box" type="text" id="searchInput" placeholder="..." oninput="filterCommands()">
  </div>
  <div class="categories" id="catBar"></div>
  <div class="stats-bar"><span id="cmdCount">0</span> <span id="statsText"></span></div>
  <div class="command-list" id="commandList"></div>
  <div class="bottom-spacer"></div>
</div>

<!-- TIPS PAGE -->
<div class="page" id="page-tips">
  <div style="padding:16px 0" id="tipsContent"></div>
  <div class="bottom-spacer"></div>
</div>

<!-- ABOUT PAGE -->
<div class="page" id="page-about">
  <div style="padding:16px 0" id="aboutContent"></div>
  <div class="bottom-spacer"></div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <div class="nav-item active" id="nav-home" onclick="showPage('home')"><span>📋</span><span id="nav1Text">أوامر</span></div>
  <div class="nav-item" id="nav-tips" onclick="showPage('tips')"><span>💡</span><span id="nav2Text">نصائح</span></div>
  <div class="nav-item" id="nav-about" onclick="showPage('about')"><span>ℹ️</span><span id="nav3Text">عن التطبيق</span></div>
</div>

let currentLang=localStorage.getItem('lang')||'ar';
let currentCat='all';
let currentSearch='';

function openLangModal(){document.getElementById('langModal').classList.add('open');}
function closeLangModal(){document.getElementById('langModal').classList.remove('open');}
function closeLangModalOutside(e){if(e.target===document.getElementById('langModal'))closeLangModal();}
function setLang(l){currentLang=l;localStorage.setItem('lang',l);closeLangModal();applyLang();}

function applyLang(){
  const t=T[currentLang];
  const flags={ar:'🇲🇦',fr:'🇫🇷',en:'🇬🇧'};
  const codes={ar:'AR',fr:'FR',en:'EN'};
  document.getElementById('appTitle').textContent=t.appTitle;
  document.getElementById('appSubtitle').textContent=t.appSubtitle;
  document.getElementById('currentLangFlag').textContent=flags[currentLang];
  document.getElementById('currentLangCode').textContent=codes[currentLang];
  document.getElementById('searchInput').placeholder=t.searchPlaceholder;
  document.getElementById('statsText').textContent=t.statsText;
  document.getElementById('nav1Text').textContent=t.nav1;
  document.getElementById('nav2Text').textContent=t.nav2;
  document.getElementById('nav3Text').textContent=t.nav3;
  document.getElementById('modalTitle').textContent=t.modalTitle;
  ['ar','fr','en'].forEach(l=>{
    document.getElementById('check-'+l).style.display=l===currentLang?'block':'none';
    document.getElementById('opt-'+l).classList.toggle('selected',l===currentLang);
  });
  document.body.style.direction=currentLang==='ar'?'rtl':'ltr';
  document.documentElement.lang=currentLang;
  renderCatBar();renderCommands();renderTips();renderAbout();
}

function renderCatBar(){
  const t=T[currentLang];
  const cats=[['all',t.catAll],['navigation',t.catNav],['reseau',t.catNet],['services',t.catSvc],['disques',t.catDisk],['users',t.catUsr],['process',t.catProc],['paquets',t.catPkg],['permissions',t.catPerm]];
  document.getElementById('catBar').innerHTML=cats.map(([id,label])=>`<button class="cat-btn${currentCat===id?' active':''}" onclick="filterCat('${id}',this)">${label}</button>`).join('');
}

function renderCommands(){
  const t=T[currentLang];
  const list=document.getElementById('commandList');
  const filtered=commands.filter(c=>{
    const d=c[currentLang];
    const matchCat=currentCat==='all'||c.cat===currentCat;
    const q=currentSearch;
    const matchSearch=!q||c.name.toLowerCase().includes(q)||d.short.toLowerCase().includes(q)||d.desc.toLowerCase().includes(q);
    return matchCat&&matchSearch;
  });
  document.getElementById('cmdCount').textContent=filtered.length;
  if(!filtered.length){list.innerHTML=`<div class="empty"><div>🔍</div>${t.emptyText}</div>`;return;}
  const catLabels={navigation:t.secNav,reseau:t.secNet,services:t.secSvc,disques:t.secDisk,users:t.secUsr,process:t.secProc,paquets:t.secPkg,permissions:t.secPerm};
  let html='',delay=0;
  if(currentCat!=='all'||currentSearch){
    filtered.forEach((c,i)=>{html+=cardHTML(c,i*40,t);});
  }else{
    const groups={};
    filtered.forEach(c=>{if(!groups[c.cat])groups[c.cat]=[];groups[c.cat].push(c);});
    Object.keys(groups).forEach(cat=>{
      html+=`<div class="section-title">${catLabels[cat]||cat}</div>`;
      groups[cat].forEach(c=>{html+=cardHTML(c,delay,t);delay+=25;});
    });
  }
  list.innerHTML=html;
}

function cardHTML(c,delay,t){
  const d=c[currentLang];
  const badge=c.badge==='danger'?`<span class="badge badge-danger">${t.badgeDanger}</span>`:c.badge==='info'?`<span class="badge badge-info">${t.badgeInfo}</span>`:'';
  const id=c.name.replace(/[\s\/]/g,'-');
  return`<div class="cmd-card" id="card-${id}" style="animation-delay:${delay}ms">
    <div class="cmd-header" onclick="toggleCard('${id}')">
      <div class="cmd-icon" style="background:${c.color}">${c.icon}</div>
      <div class="cmd-info"><div class="cmd-name">${c.name}</div><div class="cmd-short">${d.short}</div></div>
      ${badge}<span class="cmd-arrow">▼</span>
    </div>
    <div class="cmd-body">
      <div class="cmd-desc">${d.desc}</div>
      <div class="cmd-label">${t.syntaxLabel}</div>
      <div class="cmd-syntax">${c.syntax}</div>
      <div class="cmd-label">${t.exampleLabel}</div>
      <div class="cmd-example">${c.examples}</div>
      <button class="copy-btn" onclick="copyCmd('${c.name}',this)">${t.copyBtn}</button>
    </div>
  </div>`;
}

function renderTips(){
  const t=T[currentLang];
  const tips=tipsData[currentLang];
  let html=`<div class="section-title" style="margin:0 16px">${t.tipsTitle}</div>`;
  tips.forEach(tip=>{html+=`<div class="tip-card"><div class="tip-icon">${tip.icon}</div><h4>${tip.title}</h4><p>${tip.text}</p></div>`;});
  document.getElementById('tipsContent').innerHTML=html;
}

function renderAbout(){
  const items=aboutData[currentLang];
  let html=`<div class="about-card" style="text-align:center;background:linear-gradient(135deg,#1a0000,#0a0a0a)">
    <svg width="65" height="65" viewBox="0 0 100 100" style="margin:0 auto 10px"><circle cx="50" cy="50" r="48" fill="#cc0000"/><path d="M50 15C30 15 15 30 15 50C15 70 30 85 50 85C70 85 85 70 85 50C85 30 70 15 50 15Z" fill="#aa0000"/><path d="M35 35L50 20L65 35L65 55Q65 68 50 75Q35 68 35 55Z" fill="white" opacity="0.95"/><path d="M42 48L50 32L58 48L55 48L55 62L45 62L45 48Z" fill="#cc0000"/></svg>
    <h2 style="color:#fff;font-size:1.3rem">RedHat Guide</h2>
    <p style="color:var(--red-light);font-size:0.78rem;font-family:'JetBrains Mono',monospace">v2.0 — 🇲🇦 🇫🇷 🇬🇧</p>
  </div>`;
  items.forEach(item=>{html+=`<div class="about-card"><h3>${item.title}</h3><p>${item.text.replace(/\n/g,'<br>')}</p></div>`;});
  document.getElementById('aboutContent').innerHTML=html;
}

function toggleCard(id){
  const card=document.getElementById('card-'+id);
  const wasOpen=card.classList.contains('open');
  document.querySelectorAll('.cmd-card.open').forEach(c=>c.classList.remove('open'));
  if(!wasOpen){card.classList.add('open');setTimeout(()=>card.scrollIntoView({behavior:'smooth',block:'nearest'}),100);}
}

function filterCat(cat,btn){
  currentCat=cat;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  renderCommands();
}

function filterCommands(){
  currentSearch=document.getElementById('searchInput').value.toLowerCase();
  renderCommands();
}

function copyCmd(name,btn){
  navigator.clipboard.writeText(name).then(()=>{
    const t=T[currentLang];
    btn.textContent=t.copiedBtn;btn.classList.add('copied');
    setTimeout(()=>{btn.textContent=t.copyBtn;btn.classList.remove('copied');},2000);
  });
}

function showPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
}

applyLang();
</script>
